<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>DresVlog Clicker - Admin Panel</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #222; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #333; color: white; }
        button { background: #ff0000; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #cc0000; }
        .danger-btn { background: #d9534f; }
        .danger-btn:hover { background: #c9302c; }
        #adminPanel { display: none; }
    </style>
</head>
<body>

    <div class="box" id="loginSection">
        <h2>Admin Login</h2>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 15px;">Εισάγετε τον κωδικό διαχειριστή</p>
        <input type="password" id="passInput" placeholder="Κωδικός Πρόσβασης">
        <button id="loginBtn">Είσοδος</button>
    </div>

    <div class="box" id="adminPanel">
        <h2>Διαχείριση Παιχνιδιού</h2>
        <p style="color: #2ecc71; margin-bottom: 20px;">Επιτυχής Σύνδεση</p>
        
        <label style="text-align: left; display: block; font-size: 14px; color: #aaa;">Νέος Παγκόσμιος Στόχος:</label>
        <input type="number" id="newTarget" placeholder="π.χ. 500000">
        <button id="setTargetBtn">Ορισμός Στόχου</button>
        
        <hr style="border: 1px solid #333; margin: 20px 0;">
        
        <button class="danger-btn" id="resetViewsBtn">⚠️ ΜΗΔΕΝΙΣΜΟΣ ΟΛΩΝ ΤΩΝ VIEWS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        // Τα δικά σου στοιχεία Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDieQQ8okMXJOn4WdfrCedgdwBuiYbwiUs",
            authDomain: "drestclicker.firebaseapp.com",
            projectId: "drestclicker",
            storageBucket: "drestclicker.firebasestorage.app",
            messagingSenderId: "570495786216",
            appId: "1:570495786216:web:1469a2b91f94a1e57bfd5d"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 🔐 Ο ΚΩΔΙΚΟΣ ΔΙΑΧΕΙΡΙΣΤΗ
        const ADMIN_PASSWORD = "DresAdmin2026!"; 

        // Σύνδεση λειτουργιών με τα κουμπιά
        document.getElementById('loginBtn').addEventListener('click', checkPassword);
        document.getElementById('setTargetBtn').addEventListener('click', setTarget);
        document.getElementById('resetViewsBtn').addEventListener('click', resetViews);

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Λάθος Κωδικός!");
            }
        }

        function setTarget() {
            const targetVal = parseInt(document.getElementById('newTarget').value);
            if (targetVal > 0) {
                set(ref(database, 'gameData/globalTarget'), targetVal)
                    .then(() => alert("Ο στόχος άλλαξε με επιτυχία!"))
                    .catch((error) => alert("Σφάλμα: " + error.message));
            } else {
                alert("Παρακαλώ δώστε έναν έγκυρο αριθμό.");
            }
        }

        function resetViews() {
            if (confirm("ΠΡΟΣΟΧΗ! Θέλεις σίγουρα να μηδενίσεις τα views ΟΛΟΥ ΤΟΥ ΚΟΣΜΟΥ;")) {
                set(ref(database, 'gameData/globalViews'), 0)
                    .then(() => alert("Τα Views μηδενίστηκαν!"))
                    .catch((error) => alert("Σφάλμα: " + error.message));
            }
        }
    </script>
</body>
</html>
