<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>DresVlog Clicker - Admin Panel</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        input, button { padding: 10px; margin: 10px; font-size: 16px; border-radius: 5px; border: none; }
        .admin-box { display: none; background: #222; padding: 20px; border-radius: 10px; max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

    <h2>Admin Login</h2>
    <div id="loginSection">
        <input type="password" id="passInput" placeholder="Εισάγετε Κωδικό">
        <button onclick="checkPassword()">Είσοδος</button>
    </div>

    <!-- Το panel που εμφανίζεται μόνο αν ο κωδικός είναι σωστός -->
    <div id="adminPanel" class="admin-box">
        <h3>Διαχείριση Παιχνιδιού</h3>
        <hr><br>
        <label>Νέος Παγκόσμιος Στόχος:</label><br>
        <input type="number" id="newTarget" placeholder="π.χ. 1000000">
        <button onclick="setTarget()">Ενημέρωση Στόχου</button>
        <br><br>
        <button style="background: #ff3333; color: white;" onclick="resetViews()">⚠️ ΜΗΔΕΝΙΣΜΟΣ ΠΑΓΚΟΣΜΙΩΝ VIEWS</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        // Ίδιο config με πριν
        const firebaseConfig = { /* ... TO CONFIG ΣΟΥ ... */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🛑 Απλός κωδικός (Για απόλυτη ασφάλεια κανονικά γίνεται μέσω Firebase Auth, 
        // αλλά για ένα αστείο mini-game, ένας κωδικός στο JS αρκεί)
        const ADMIN_PASSWORD = "DresVlogKing2026"; 

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("Λάθος κωδικός!");
            }
        }

        function setTarget() {
            const targetVal = parseInt(document.getElementById('newTarget').value);
            if(targetVal > 0) {
                database.ref('gameData/globalTarget').set(targetVal);
                alert("Ο στόχος άλλαξε!");
            }
        }

        function resetViews() {
            if(confirm("Θέλεις σίγουρα να μηδενίσεις τα views ΟΛΟΥ ΤΟΥ ΚΟΣΜΟΥ;")) {
                database.ref('gameData/globalViews').set(0);
                alert("Τα Views μηδενίστηκαν!");
            }
        }
    </script>
</body>
</html>
