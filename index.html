<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRESTVLOG SITES</title>
    <style>
        /* Modern Dark Theme Styling */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --glow-color: rgba(59, 130, 246, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-top: 3rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        /* Container για τα κουμπιά */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* Στυλ για το κάθε κουμπί/site */
        .site-button {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        /* Hover εφέ που "φωσφορίζει" */
        .site-button:hover {
            background-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px var(--glow-color);
            border-color: var(--accent-hover);
        }

        /* Responsive μικροδιορθώσεις για κινητά */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .grid-container { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>DRESTVLOG SITES</h1>
    </header>

    <div class="grid-container">
	
		
        <a href="https://drestvlog.github.io/live" target="_blank" class="site-button">
            Twitch Live
        </a>

        <a href="https://drestvlog.github.io/cv" target="_blank" class="site-button">
            Βιογραφικό
        </a>

        <a href="https://drestiliaris.netlify.app/" target="_blank" class="site-button">
            Πληροφορίες
        </a>

        <a href="https://dresthliaris.netlify.app/" target="_blank" class="site-button">
            Links
        </a>

        </div>

	<header>
        <h1>MINI GAMES</h1>
    </header>

    <div class="grid-container">

		<a href="https://drestvlog.github.io/ninja" target="_blank" class="site-button">
            Anergo Ninja
        </a>
        <a href="https://drestvlog.github.io/clicker" target="_blank" class="site-button">
            Drest Clicker
        </a>
		
        <a href="https://drestvlog.github.io/ai" target="_blank" class="site-button">
            drestAI
        </a>

        <a href="https://drestvlog.github.io/maze" target="_blank" class="site-button">
            Mini Game
        </a>
		
        <a href="https://drestvlog.github.io/jump" target="_blank" class="site-button">
            Έκπληξη
        </a>
		
        </div>

	<header>
        <h1>OTHER</h1>
    </header>

    <div class="grid-container">
		
        <a href="https://drestvlog.github.io/aman-re-mamalaki-douleia-exoume" target="_blank" class="site-button">
            ΑΜΑΝ ΡΕ ΜΑΜΑΛΑΚΗ ΔΟΥΛΕΙΑ ΕΧΟΥΜΕ
        </a>
		
        <a href="https://drestvlog.github.io/patouses" target="_blank" class="site-button">
            Πατούσες
        </a>

		

        </div>
	        
	<div class="subtitle">Made by den_to_hksera</div>
</body>
</html>
