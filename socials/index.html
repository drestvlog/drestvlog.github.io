<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Socials</title>
  <style>
    /* Global Styles & Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    /* Profile Section */
    .profile {
      margin-bottom: 2rem;
    }

    .profile-img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }

    .profile-img:hover {
      transform: scale(1.05);
    }

    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
    }

    .profile-bio {
      font-size: 0.95rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    /* Section Headers */
    .section-header {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0 1rem;
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .section-header::before,
    .section-header::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .section-header span {
      padding: 0 1rem;
    }

    /* Links Container */
    .links-list {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    /* Modern Link Cards (Glassmorphism Style) */
    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    .link-card:active {
      transform: translateY(0);
    }

    .link-content {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .link-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .arrow-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .link-card:hover .arrow-icon {
      opacity: 1;
      transform: translateX(3px);
    }

    /* Private / VIP Styling Accent */
    .link-card.private {
      border-color: rgba(168, 85, 247, 0.3);
      background: rgba(168, 85, 247, 0.08);
    }

    .link-card.private:hover {
      background: rgba(168, 85, 247, 0.18);
      border-color: rgba(168, 85, 247, 0.5);
    }

    /* Footer */
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Profile Header -->
    <header class="profile">
      <!-- Replace the src URL with your own avatar image -->
      <img class="profile-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=250" alt="Profile Picture">
      <h1 class="profile-name">@YourName</h1>
      <p class="profile-bio">Creator & Designer • Welcome to my personal hub ✨</p>
    </header>

    <!-- Public Socials Section -->
    <div class="section-header">
      <span>drestvlog</span>

        <div class="link-content">
          <!-- YouTube SVG Icon -->
          <svg class="link-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

      </a>
    </div>

    <!-- Private / Alternate Section Header -->
    <div class="section-header">
      <span>Fanclub</span>
    </div>

    <div class="links-list">
      <a href="https://instagram.com/privhandle" target="_blank" rel="noopener noreferrer" class="link-card private">
        <div class="link-content">
          <!-- Lock Icon -->
          <svg class="link-icon" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 5a3 3 0 0 1 6 0v3H9V7zm3 6a1.5 1.5 0 0 1 1 1.118v2.382a1 1 0 1 1-2 0v-2.382A1.5 1.5 0 0 1 12 13z"/></svg>
          <span>Private Instagram (Close Friends)</span>
        </div>
        <svg class="arrow-icon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-7-7l7 7-7 7"/></svg>
      </a>

      <a href="https://tiktok.com/@privhandle" target="_blank" rel="noopener noreferrer" class="link-card private">
        <div class="link-content">
          <!-- Lock Icon -->
          <svg class="link-icon" viewBox="0 0 24 24"><path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 5a3 3 0 0 1 6 0v3H9V7zm3 6a1.5 1.5 0 0 1 1 1.118v2.382a1 1 0 1 1-2 0v-2.382A1.5 1.5 0 0 1 12 13z"/></svg>
          <span>Private TikTok</span>
        </div>
        <svg class="arrow-icon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-7-7l7 7-7 7"/></svg>
      </a>
    </div>

    <!-- Footer -->
    <footer>
      <p>© <span id="year"></span> @YourName. All rights reserved.</p>
    </footer>

  </div>

  <!-- JavaScript -->
  <script>
    // Automatically set current year in footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // Optional: Dynamic interaction effect (subtle tilt on click)
    document.querySelectorAll('.link-card').forEach(card => {
      card.addEventListener('mousedown', () => {
        card.style.transform = 'scale(0.98)';
      });
      card.addEventListener('mouseup', () => {
        card.style.transform = '';
      });
    });
  </script>
</body>
</html>
