<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRESTVLOG PATOUSES</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        45deg,
        #ff0000,
        #ff8800,
        #ffff00,
        #00ff00,
        #00ffff,
        #0000ff,
        #ff00ff,
        #ff0000
    );
    background-size:800% 800%;
    animation:bgMove 8s linear infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

body::before{
    content:"";
    position:absolute;
    inset:-50%;
    background:
        radial-gradient(circle, rgba(255,255,255,.3) 2px, transparent 3px);
    background-size:40px 40px;
    animation:spin 20s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.container{
    position:relative;
    z-index:10;
    text-align:center;
}

h1{
    font-size:5rem;
    color:white;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff00ff,
        0 0 40px #00ffff,
        0 0 60px #ffff00;
    animation:bounce 1s infinite alternate;
}

@keyframes bounce{
    from{transform:scale(1) rotate(-2deg);}
    to{transform:scale(1.08) rotate(2deg);}
}
</style>
</head>
<body>

<div class="container">
    <h1>DRESTVLOG PATOUSES</h1>
</div>

</body>
</html>
