<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Experience</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        /* Μαύρη αρχική οθόνη */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000; /* Απόλυτο μαύρο */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.4s ease;
        }
        /* Το κουμπί CLICK HERE */
        #start-btn {
            padding: 20px 40px;
            font-size: 28px; /* Μεγάλο μέγεθος */
            font-weight: 900; /* Πολύ έντονα γράμματα */
            letter-spacing: 2px; /* Απόσταση μεταξύ των γραμμάτων */
            cursor: pointer;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }
        #start-btn:hover {
            transform: scale(1.08);
            background-color: #e6e6e6;
        }
        /* Το κυρίως περιεχόμενο */
        #content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Κρυφό μέχρι να πατηθεί το κουμπί */
            transition: opacity 0.5s ease;
        }
        /* Η εικόνα 1920x1080 */
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            max-width: 1920px;
            max-height: 1080px;
        }
    </style>
</head>
<body>

    <!-- Αρχική Οθόνη με το Κουμπί -->
    <div id="splash-screen">
        <button id="start-btn">CLICK HERE</button>
    </div>

    <!-- Κυρίως Περιεχόμενο (Εικόνα) -->
    <div id="content">
        <!-- Άλλαξε το src με τη δική σου εικόνα -->
        <img class="bg-image" src="https://picsum.photos/1920/1080" alt="Full Screen Image">
    </div>

    <!-- Ήχος χωρίς controls -->
    <!-- Άλλαξε το src με τον δικό σου ήχο -->
    <audio id="my-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script>
        const splash = document.getElementById('splash-screen');
        const content = document.getElementById('content');
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('my-audio');
        const docEl = document.documentElement;

        startBtn.addEventListener('click', () => {
            // 1. Ενεργοποίηση Full Screen
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.mozRequestFullScreen) { 
                docEl.mozRequestFullScreen();
            } else if (docEl.webkitRequestFullscreen) { 
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) { 
                docEl.msRequestFullscreen();
            }

            // 2. Έναρξη Ήχου
            audio.play().catch(error => {
                console.log("Audio playback failed:", error);
            });

            // 3. Εμφάνιση περιεχομένου και εξαφάνιση του κουμπιού
            content.style.opacity = '1';
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
            }, 400);
        });
    </script>

</body>
</html>
