<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DresVlog View Clicker</title>
    <style>
        /* Modern Reset & Base Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f0f0f;
            color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Layout */
        .game-container {
            width: 100%;
            max-width: 900px;
            background: #1f1f1f;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #2f2f2f;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* Left Side: Clicker Area */
        .clicker-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #2f2f2f;
            background: radial-gradient(circle at center, #2a1515 0%, #1f1f1f 100%);
            position: relative;
        }

        /* Right Side: Upgrades Area */
        .upgrades-section {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background-color: #161616;
            max-height: 600px;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Upgrades */
        .upgrades-section::-webkit-scrollbar {
            width: 6px;
        }
        .upgrades-section::-webkit-scrollbar-track {
            background: #161616;
        }
        .upgrades-section::-webkit-scrollbar-thumb {
            background: #3f3f3f;
            border-radius: 3px;
        }

        /* Typography & Stats */
        h1 {
            font-size: 24px;
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
        }

        .counter-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .views-count {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
        }

        .vps-count {
            font-size: 15px;
            color: #2ecc71;
            margin-top: 5px;
            font-weight: 600;
        }

        /* The Big Click Button */
        .click-target {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #ff0000 0%, #b30000 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.4);
            transition: transform 0.05s ease, box-shadow 0.1s ease;
            position: relative;
            user-select: none;
            border: 4px solid #ffffff;
        }

        .click-target:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(255, 0, 0, 0.6);
        }

        .click-target:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }

        .click-target-inner {
            font-size: 48px;
            color: white;
            font-weight: bold;
        }

        /* Floating text animation (+1 View) */
        .floating-text {
            position: absolute;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.8);
            }
        }

        /* Upgrades Header */
        .upgrades-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
            border-bottom: 2px solid #2f2f2f;
            padding-bottom: 10px;
        }

        /* Upgrade Item Row */
        .upgrade-btn {
            background: #212121;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            text-align: left;
            width: 100%;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: #2b2b2b;
            border-color: #444;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #1a1a1a;
            border-color: #222;
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
        }

        .upgrade-name {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
        }

        .upgrade-effect {
            font-size: 12px;
            color: #2ecc71;
        }

        .upgrade-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .upgrade-cost {
            font-size: 14px;
            font-weight: bold;
            color: #f1c40f;
        }

        .upgrade-count {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
            background: #333;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Reset Progress Button */
        .reset-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: auto;
            align-self: center;
            transition: color 0.2s, border-color 0.2s;
        }

        .reset-btn:hover {
            color: #ff3333;
            border-color: #ff3333;
        }

        /* Responsive Breakpoint for Mobile layout */
        @media (max-width: 680px) {
            .game-container {
                flex-direction: column;
            }
            .clicker-section {
                border-right: none;
                border-bottom: 1px solid #2f2f2f;
                padding: 30px 20px;
            }
            .upgrades-section {
                max-height: none;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Clicker Section -->
        <div class="clicker-section" id="clickerSection">
            <h1>DresVlog Clicker</h1>
            <div class="subtitle">Κάνε κλικ για να μαζέψεις Views!</div>

            <div class="counter-container">
                <div class="views-count" id="viewsDisplay">0</div>
                <div class="vps-count" id="vpsDisplay">+0 views / δευτ.</div>
            </div>

            <!-- The Big Button representing the Camera/Vlog concept -->
            <div class="click-target" id="clickTarget">
                <div class="click-target-inner">🎥</div>
            </div>
        </div>

        <!-- Upgrades Section -->
        <div class="upgrades-section">
            <div class="upgrades-header">Αναβαθμίσεις & Εξοπλισμός</div>
            
            <div id="upgradesList">
                <!-- Upgrades injected via JavaScript dynamically -->
            </div>

            <button class="reset-btn" id="resetBtn">Επαναφορά Παιχνιδιού</button>
        </div>
    </div>

    <script>
        // Game State Object
        let gameState = {
            views: 0,
            viewsPerSecond: 0,
            upgrades: [
                { id: 'energy', name: '🔋 Energy Drink (για το edit)', cost: 50, cps: 1, count: 0, baseCost: 50 },
                { id: 'clickbait', name: '😱 Τίτλος με ΚΕΦΑΛΑΙΑ', cost: 400, cps: 8, count: 0, baseCost: 400 },
                { id: 'cameo', name: '👥 Cameo από φιλαράκι', cost: 2000, cps: 40, count: 0, baseCost: 2000 },
                { id: 'arrow', name: '🏹 Κόκκινο Βέλος στο Thumbnail', cost: 12000, cps: 250, count: 0, baseCost: 12000 },
                { id: 'giveaway', name: '🎁 iPhone Giveaway στο Instagram', cost: 75000, cps: 1400, count: 0, baseCost: 75000 }
            ]
        };

        // DOM Elements
        const viewsDisplay = document.getElementById('viewsDisplay');
        const vpsDisplay = document.getElementById('vpsDisplay');
        const clickTarget = document.getElementById('clickTarget');
        const clickerSection = document.getElementById('clickerSection');
        const upgradesList = document.getElementById('upgradesList');
        const resetBtn = document.getElementById('resetBtn');

        // Load game on start
        function loadGame() {
            const savedState = localStorage.getItem('dresVlogClickerSave');
            if (savedState) {
                try {
                    const parsed = JSON.parse(savedState);
                    if (parsed && typeof parsed.views === 'number') {
                        gameState.views = parsed.views;
                        // Map saved counts back to original upgrades template safely
                        parsed.upgrades.forEach(savedUp => {
                            const up = gameState.upgrades.find(u => u.id === savedUp.id);
                            if (up) {
                                up.count = savedUp.count;
                                up.cost = savedUp.cost;
                            }
                        });
                    }
                } catch (e) {
                    console.error("Σφάλμα κατά τη φόρτωση του save:", e);
                }
            }
            recalculateVPS();
            renderUpgrades();
            updateDisplay();
        }

        // Save game state
        function saveGame() {
            localStorage.setItem('dresVlogClickerSave', JSON.stringify(gameState));
        }

        // Recalculate global Views Per Second
        function recalculateVPS() {
            gameState.viewsPerSecond = gameState.upgrades.reduce((total, up) => total + (up.count * up.cps), 0);
        }

        // Format Big Numbers nicely
        function formatNumber(num) {
            return Math.floor(num).toLocaleString('el-GR');
        }

        // Update Text Elements across UI
        function updateDisplay() {
            viewsDisplay.innerText = formatNumber(gameState.views);
            vpsDisplay.innerText = `+${formatNumber(gameState.viewsPerSecond)} views / δευτ.`;
            
            // Enable/Disable buttons based on current views
            gameState.upgrades.forEach(up => {
                const btn = document.getElementById(`btn-${up.id}`);
                if (btn) {
                    btn.disabled = gameState.views < up.cost;
                    const costSpan = document.getElementById(`cost-${up.id}`);
                    if (costSpan) costSpan.innerText = formatNumber(up.cost);
                    const countSpan = document.getElementById(`count-${up.id}`);
                    if (countSpan) countSpan.innerText = `x${up.count}`;
                }
            });
        }

        // Render Upgrade Row elements into DOM
        function renderUpgrades() {
            upgradesList.innerHTML = '';
            gameState.upgrades.forEach(up => {
                const btn = document.createElement('button');
                btn.className = 'upgrade-btn';
                btn.id = `btn-${up.id}`;
                btn.innerHTML = `
                    <div class="upgrade-info">
                        <span class="upgrade-name">${up.name}</span>
                        <span class="upgrade-effect">+${up.cps} views/sec</span>
                    </div>
                    <div class="upgrade-meta">
                        <span class="upgrade-cost" id="cost-${up.id}">${formatNumber(up.cost)}</span>
                        <span class="upgrade-count" id="count-${up.id}">x${up.count}</span>
                    </div>
                `;
                
                btn.addEventListener('click', () => buyUpgrade(up.id));
                upgradesList.appendChild(btn);
            });
        }

        // Handle Buying of an Upgrade
        function buyUpgrade(id) {
            const up = gameState.upgrades.find(u => u.id === id);
            if (up && gameState.views >= up.cost) {
                gameState.views -= up.cost;
                up.count++;
                // Exponential price increase rule
                up.cost = Math.floor(up.baseCost * Math.pow(1.15, up.count));
                
                recalculateVPS();
                updateDisplay();
                saveGame();
            }
        }

        // Handle Big Manual Click & visual text burst effect
        function handleManualClick(e) {
            gameState.views += 1;
            updateDisplay();
            
            // Visual text effect (+1 View animation floating up)
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+1';
            
            // Handle positioning based on mouse click coordinates inside section
            const rect = clickerSection.getBoundingClientRect();
            let x, y;
            if (e.clientX && e.clientY) {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            } else {
                // Fallback for centered touch points
                x = rect.width / 2;
                y = rect.height / 2;
            }
            
            text.style.left = `${x}px`;
            text.style.top = `${y}px`;
            
            clickerSection.appendChild(text);
            
            // Clean element after animation ends
            setTimeout(() => {
                text.remove();
            }, 800);
        }

        // Wire Event Listeners
        clickTarget.addEventListener('click', handleManualClick);
        
        resetBtn.addEventListener('click', () => {
            if(confirm("Είσαι σίγουρος ότι θέλεις να μηδενίσεις όλα σου τα Views και τις Αναβαθμίσεις;")) {
                localStorage.removeItem('dresVlogClickerSave');
                gameState.views = 0;
                gameState.viewsPerSecond = 0;
                gameState.upgrades.forEach(up => {
                    up.count = 0;
                    up.cost = up.baseCost;
                });
                recalculateVPS();
                renderUpgrades();
                updateDisplay();
            }
        });

        // Main game loop ticker (Runs 10 times a second for snappy visuals)
        setInterval(() => {
            if (gameState.viewsPerSecond > 0) {
                gameState.views += (gameState.viewsPerSecond / 10);
                updateDisplay();
            }
        }, 100);

        // Auto Save to localStorage every 15 seconds
        setInterval(() => {
            saveGame();
        }, 15000);

        // Initial Initialization
        loadGame();
    </script>
</body>
</html>
