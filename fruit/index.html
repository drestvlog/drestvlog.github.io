<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja Clone - Custom Sounds</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a0f00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #331a00 0%, #1a0f00 100%);
            cursor: crosshair;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }
        #score-container {
            color: #ffcc00;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
        }
        #lives-container {
            display: flex;
            gap: 10px;
        }
        .heart {
            font-size: 32px;
            color: #ff3333;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }
        .heart.lost {
            color: #444;
            transform: scale(0.8);
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #game-over-screen.active {
            opacity: 1;
            pointer-events: auto;
        }
        #game-over-screen h1 {
            font-size: 64px;
            color: #ff3333;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,51,51,0.5);
        }
        #final-score {
            font-size: 28px;
            margin-bottom: 30px;
            color: #ffcc00;
        }
        .btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9900 0%, #cc6600 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0,0,0,0.6);
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #4a2700 0%, #1a0f00 100%);
            z-index: 25;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        #start-screen h1 {
            font-size: 72px;
            color: #ff9900;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            font-style: italic;
        }
        #start-screen p {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }
        .audio-note {
            font-size: 13px;
            color: #ffcc00;
            margin-top: 15px;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div class="top-bar">
                <div id="score-container">SCORE: <span id="score-value">0</span></div>
                <div id="lives-container">
                    <span class="heart" id="heart-1">❤</span>
                    <span class="heart" id="heart-2">❤</span>
                    <span class="heart" id="heart-3">❤</span>
                </div>
            </div>
        </div>

        <div id="start-screen">
            <h1>FRUIT NINJA</h1>
            <p>Σύρετε το ποντίκι ή το δάχτυλό σας πάνω από τα φρούτα για να τα κόψετε. Αποφύγετε τις βόμβες!</p>
            <button class="btn" id="start-btn">ΕΝΑΡΞΗ ΠΑΙΧΝΙΔΙΟΥ</button>
            <div class="audio-note">
            </div>
        </div>

        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <div id="final-score">Τελικό Σκορ: 0</div>
            <button class="btn" id="restart-btn">ΠΑΙΞΕ ΞΑΝΑ</button>
        </div>
    </div>

    <script>
        // --- ΡΥΘΜΙΣΗ ΗΧΩΝ (ΕΔΩ ΒΑΖΕΤΕ ΤΑ ΔΙΚΑ ΣΑΣ ΑΡΧΕΙΑ) ---
        // Μπορείτε να προσθέσετε όσα mp3 ή wav θέλετε στη λίστα των φρούτων
        const fruitSoundFiles = [
            'drest1.mp3',
            'drest2.mp3',
            'drest3.mp3',
            'drest4.mp3',
            'drest5.mp3'
        ];

        // Ο συγκεκριμένος ήχος όταν κόβεται η βόμβα
        const bombSoundFile = 'explosion.mp3';

        // Πίνακες για την αποθήκευση των Audio αντικειμένων
        let fruitAudios = [];
        let bombAudio = null;

        function initAudio() {
            // Προ-φόρτωση των ήχων για τα φρούτα
            if (fruitAudios.length === 0) {
                fruitSoundFiles.forEach(file => {
                    let audio = new Audio(file);
                    audio.preload = 'auto';
                    fruitAudios.push(audio);
                });
            }
            // Προ-φόρτωση του ήχου της βόμβας
            if (!bombAudio) {
                bombAudio = new Audio(bombSoundFile);
                bombAudio.preload = 'auto';
            }
        }

        function playRandomFruitSound() {
            if (fruitAudios.length === 0) return;
            // Επιλογή τυχαίου ήχου από τη λίστα
            const randomIndex = Math.floor(Math.random() * fruitAudios.length);
            const audio = fruitAudios[randomIndex];
            
            // Μηδενισμός του χρόνου για να μπορεί να ξαναπαίξει αμέσως αν κοπούν πολλά φρούτα μαζί
            audio.currentTime = 0; 
            audio.play().catch(e => console.log("Αποτυχία αναπαραγωγής ήχου φρούτου (ίσως δεν βρέθηκε το αρχείο):", e));
        }

        function playBombSound() {
            if (!bombAudio) return;
            bombAudio.currentTime = 0;
            bombAudio.play().catch(e => console.log("Αποτυχία αναπαραγωγής ήχου βόμβας (ίσως δεν βρέθηκε το αρχείο):", e));
        }


        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let gameState = 'START';
        let score = 0;
        let lives = 3;
        let gameObjects = [];
        let particles = [];
        let bladeTrail = [];
        let spawnTimer = 0;
        let spawnInterval = 1000;
        let lastTime = 0;

        const fruitTypes = [
            { emoji: '🍉', color: '#ff3344', radius: 45 },
            { emoji: '🍎', color: '#ff2222', radius: 35 },
            { emoji: '🍌', color: '#ffcc00', radius: 35 },
            { emoji: '🍊', color: '#ff9900', radius: 35 },
            { emoji: '🍍', color: '#e6b800', radius: 40 },
            { emoji: '🥝', color: '#66cc33', radius: 30 },
            { emoji: '🥥', color: '#996633', radius: 38 }
        ];

        class GameObject {
            constructor(isBomb = false) {
                this.isBomb = isBomb;
                if (this.isBomb) {
                    this.emoji = '💣';
                    this.radius = 35;
                    this.color = '#333333';
                } else {
                    const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                    this.emoji = type.emoji;
                    this.color = type.color;
                    this.radius = type.radius;
                }

                this.x = Math.random() * (canvas.width * 0.6) + (canvas.width * 0.2);
                this.y = canvas.height + this.radius;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -(Math.random() * 4 + 12) * (canvas.height / 800); 
                this.gravity = 0.25 * (canvas.height / 800);
                this.sliced = false;
                this.sliceAngle = 0;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.parts = [];
            }

            update() {
                if (!this.sliced) {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;

                    if (this.y > canvas.height + this.radius * 2 && this.vy > 0) {
                        if (!this.isBomb && gameState === 'PLAYING') {
                            loseLife();
                        }
                        return false;
                    }
                } else {
                    this.parts.forEach(part => {
                        part.vy += this.gravity;
                        part.x += part.vx;
                        part.y += part.vy;
                        part.rotation += part.rotationSpeed;
                    });
                    if (this.parts[0].y > canvas.height + this.radius * 2) {
                        return false;
                    }
                }
                return true;
            }

            draw() {
                ctx.save();
                if (!this.sliced) {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.font = `${this.radius * 1.5}px Arial`;
                    ctx.textBaseline = 'middle';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.emoji, 0, 0);
                } else {
                    this.parts.forEach(part => {
                        ctx.save();
                        ctx.translate(part.x, part.y);
                        ctx.rotate(part.rotation);
                        
                        ctx.beginPath();
                        if (part.side === 'left') {
                            ctx.rect(-this.radius * 2, -this.radius * 2, this.radius * 2, this.radius * 4);
                        } else {
                            ctx.rect(0, -this.radius * 2, this.radius * 2, this.radius * 4);
                        }
                        ctx.clip();

                        ctx.font = `${this.radius * 1.5}px Arial`;
                        ctx.textBaseline = 'middle';
                        ctx.textAlign = 'center';
                        ctx.fillText(this.emoji, 0, 0);
                        ctx.restore();
                    });
                }
                ctx.restore();
            }

            slice(angle) {
                if (this.sliced) return;
                this.sliced = true;
                this.sliceAngle = angle;

                if (this.isBomb) {
                    playBombSound(); // Ενεργοποίηση ήχου βόμβας
                    createExplosionParticles(this.x, this.y);
                    gameOver();
                } else {
                    score++;
                    document.getElementById('score-value').innerText = score;
                    playRandomFruitSound(); // Ενεργοποίηση τυχαίου ήχου φρούτου
                    createSplashParticles(this.x, this.y, this.color);

                    const speed = 3;
                    const cos = Math.cos(angle + Math.PI/2);
                    const sin = Math.sin(angle + Math.PI/2);

                    this.parts = [
                        {
                            x: this.x, y: this.y,
                            vx: this.vx - cos * speed, vy: this.vy - sin * speed,
                            rotation: this.rotation, rotationSpeed: -0.05, side: 'left'
                        },
                        {
                            x: this.x, y: this.y,
                            vx: this.vx + cos * speed, vy: this.vy + sin * speed,
                            rotation: this.rotation, rotationSpeed: 0.05, side: 'right'
                        }
                    ];
                }
            }

            checkCollision(p1, p2) {
                if (this.sliced) return false;

                const A = this.x - p1.x;
                const B = this.y - p1.y;
                const C = p2.x - p1.x;
                const D = p2.y - p1.y;

                const dot = A * C + B * D;
                const lenSq = C * C + D * D;
                let param = -1;
                
                if (lenSq !== 0) param = dot / lenSq;

                let xx, yy;

                if (param < 0) {
                    xx = p1.x;
                    yy = p1.y;
                } else if (param > 1) {
                    xx = p2.x;
                    yy = p2.y;
                } else {
                    xx = p1.x + param * C;
                    yy = p2.y + param * D;
                }

                const dx = this.x - xx;
                const dy = this.y - yy;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < this.radius) {
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    this.slice(angle);
                    return true;
                }
                return false;
            }
        }

        class Particle {
            constructor(x, y, color, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.isExplosion = isExplosion;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = isExplosion ? Math.random() * 8 + 4 : Math.random() * 5 + 2;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = isExplosion ? Math.random() * 5 + 3 : Math.random() * 4 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.gravity = 0.15;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createSplashParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color, false));
            }
        }

        function createExplosionParticles(x, y) {
            for (let i = 0; i < 40; i++) {
                const colors = ['#ffcc00', '#ff3300', '#ff9900', '#ffffcc', '#333'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, randomColor, true));
            }
        }

        function addTrailPoint(x, y) {
            bladeTrail.push({ x, y, time: Date.now() });
        }

        function updateAndDrawTrail() {
            const now = Date.now();
            bladeTrail = bladeTrail.filter(p => now - p.time < 150);

            if (bladeTrail.length < 2) return;

            ctx.save();
            ctx.beginPath();
            ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
            
            for (let i = 1; i < bladeTrail.length; i++) {
                ctx.lineTo(bladeTrail[i].x, bladeTrail[i].y);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = '#e6f7ff';
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                spawnTimer += deltaTime;
                if (spawnTimer > spawnInterval) {
                    spawnTimer = 0;
                    const spawnCount = Math.random() > 0.7 ? 2 : 1;
                    for(let i=0; i<spawnCount; i++) {
                        const isBomb = Math.random() < 0.2;
                        gameObjects.push(new GameObject(isBomb));
                    }
                    if (spawnInterval > 500) spawnInterval -= 5;
                }
            }

            gameObjects = gameObjects.filter(obj => {
                const keep = obj.update();
                if (keep) obj.draw();
                return keep;
            });

            particles = particles.filter(p => {
                const keep = p.update();
                if (keep) p.draw();
                return keep;
            });

            if (bladeTrail.length >= 2 && gameState === 'PLAYING') {
                const p1 = bladeTrail[bladeTrail.length - 2];
                const p2 = bladeTrail[bladeTrail.length - 1];
                
                gameObjects.forEach(obj => {
                    obj.checkCollision(p1, p2);
                });
            }

            updateAndDrawTrail();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initAudio(); // Φόρτωση των αρχείων ήχου μόλις πατηθεί το start
            score = 0;
            lives = 3;
            spawnInterval = 1000;
            gameObjects = [];
            particles = [];
            bladeTrail = [];
            document.getElementById('score-value').innerText = '0';
            updateLivesUI();
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').classList.remove('active');
            
            gameState = 'PLAYING';
        }

        function loseLife() {
            lives--;
            updateLivesUI();
            if (lives <= 0) {
                gameOver();
            }
        }

        function updateLivesUI() {
            for (let i = 1; i <= 3; i++) {
                const heart = document.getElementById(`heart-${i}`);
                if (i <= lives) {
                    heart.classList.remove('lost');
                } else {
                    heart.classList.add('lost');
                }
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('final-score').innerText = `Τελικό Σκορ: ${score}`;
            document.getElementById('game-over-screen').classList.add('active');
        }

        let isDrawing = false;

        function handlePointerStart(x, y) {
            isDrawing = true;
            bladeTrail = [];
            addTrailPoint(x, y);
        }

        function handlePointerMove(x, y) {
            if (!isDrawing) return;
            addTrailPoint(x, y);
        }

        function handlePointerEnd() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', (e) => handlePointerStart(e.clientX, e.clientY));
        canvas.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handlePointerEnd);

        canvas.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                handlePointerStart(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        canvas.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        window.addEventListener('touchend', handlePointerEnd);

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
