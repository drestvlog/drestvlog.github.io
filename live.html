<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrestVlog Live</title>
    <style>
        /* --- Μοντέρνα Γραμματοσειρά & Reset --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0c;
            color: #f1f1f4;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Εξαφανίζει το scrollbar για full screen εμπειρία */
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- Κινούμενο Φόντο (Glow Effect) --- */
        .bg-glow {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 80% 20%, rgba(145, 70, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(0, 242, 254, 0.1) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- Κεντρικό Container --- */
        .app-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        /* --- Μοντέρνο Header (Frosted Glass / Glassmorphism) --- */
        .main-header {
            background: rgba(31, 31, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            gap: 20px;
        }

        .logo-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .live-indicator {
            background-color: #eb0400;
            color: white;
            font-weight: 800;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        .main-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(45deg, #9146ff, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Container για τα Social & Links Buttons --- */
        .links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            flex: 1;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #efeff1;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Ειδικά χρώματα για να ξεχωρίζουν ορισμένα κουμπιά */
        .nav-btn.twitch-btn-alt { border-color: rgba(145, 70, 255, 0.4); color: #bf94ff; }
        .nav-btn.twitch-btn-alt:hover { background: rgba(145, 70, 255, 0.2); border-color: #9146ff; color: #fff; }
        
        .nav-btn.insta-btn { border-color: rgba(225, 48, 108, 0.4); color: #ff659b; }
        .nav-btn.insta-btn:hover { background: rgba(225, 48, 108, 0.2); border-color: #e1306c; color: #fff; }

        .nav-btn.tiktok-btn { border-color: rgba(0, 242, 254, 0.4); color: #00f2fe; }
        .nav-btn.tiktok-btn:hover { background: rgba(0, 242, 254, 0.2); border-color: #00f2fe; color: #fff; }

        .nav-btn.discord-btn { border-color: rgba(88, 101, 242, 0.4); color: #5865f2; }
        .nav-btn.discord-btn:hover { background: rgba(88, 101, 242, 0.2); border-color: #5865f2; color: #fff; }

        .nav-btn.donate-btn { border-color: rgba(0, 224, 140, 0.4); color: #00e08c; font-weight: 800; }
        .nav-btn.donate-btn:hover { background: rgba(0, 224, 140, 0.2); border-color: #00e08c; color: #fff; box-shadow: 0 0 10px rgba(0, 224, 140, 0.2); }

        /* Μοντέρνο Twitch Κουμπί (Κύριο) */
        .twitch-btn {
            background: linear-gradient(135deg, #9146ff 0%, #772ce8 100%);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(145, 70, 255, 0.3);
            flex-shrink: 0;
        }

        .twitch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(145, 70, 255, 0.5);
            background: linear-gradient(135deg, #a466ff 0%, #8642ff 100%);
        }

        /* --- Layout για το Stream και το Chat --- */
        .stream-layout {
            display: flex;
            flex: 1;
            gap: 15px;
            height: calc(100vh - 100px); /* Αφαιρεί το ύψος του header */
            min-height: 0; /* Διορθώνει bug του flexbox σε full screen */
        }

        /* --- 16:9 Video Container με Glow Border --- */
        .video-container {
            flex: 3.5; /* Δίνει προτεραιότητα στο βίντεο */
            position: relative;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(145, 70, 255, 0.2);
            transition: border-color 0.3s ease;
        }

        .video-container:hover {
            border-color: rgba(145, 70, 255, 0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Μοντέρνο Chat Container --- */
        .chat-container {
            flex: 1;
            min-width: 340px;
            background: rgba(21, 21, 26, 0.8);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .chat-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(235, 4, 0, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 8px rgba(235, 4, 0, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(235, 4, 0, 0); }
        }

        /* --- Responsive για Κινητά / Μικρές Οθόνες --- */
        @media (max-width: 1024px) {
            body {
                overflow-y: auto; /* Επιτρέπει το scroll μόνο σε κινητά */
                height: auto;
            }
            
            .app-container {
                height: auto;
            }

            .main-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 20px 15px;
            }

            .stream-layout {
                flex-direction: column;
                height: auto;
            }

            .video-container {
                width: 100%;
                aspect-ratio: 16 / 9; /* Κρατάει την αναλογία 16:9 στα κινητά */
            }

            .chat-container {
                width: 100%;
                height: 450px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="app-container">
        
        <header class="main-header">
            <div class="logo-zone">
                <div class="live-indicator">LIVE</div>
                <h1>DrestVlog</h1>
            </div>
            
            <!-- Τα Social / Links Buttons -->
            <div class="links-container">
                <a href="https://www.twitch.tv/drestvlog/clips" target="_blank" class="nav-btn twitch-btn-alt">Clips</a>
                <a href="https://www.twitch.tv/drestvlog/schedule" target="_blank" class="nav-btn twitch-btn-alt">Πρόγραμμα</a>
                <a href="https://discord.gg/7efMbZrhjG" target="_blank" class="nav-btn discord-btn">Discord</a>
                <a href="https://www.paypal.com/paypalme/drestvlog" target="_blank" class="nav-btn donate-btn">Donate</a>
                <a href="https://www.instagram.com/drestiliaris/" target="_blank" class="nav-btn insta-btn">Instagram 1</a>
                <a href="https://www.instagram.com/giorgos.drestiliaris/" target="_blank" class="nav-btn insta-btn">Instagram 2</a>
                <a href="https://www.facebook.com/giorgos.drestiliaris/" target="_blank" class="nav-btn">Facebook</a>
                <a href="https://x.com/drestgeorge" target="_blank" class="nav-btn">Twitter</a>
                <a href="https://soundcloud.com/giorgos-drestiliaris" target="_blank" class="nav-btn">Soundcloud</a>
                <a href="https://www.tiktok.com/@giorgosdrestiliaris" target="_blank" class="nav-btn tiktok-btn">Tiktok</a>
				
            </div>

            <a href="https://twitch.tv/drestvlog" target="_blank" class="twitch-btn">
                <span>Κανάλι Twitch</span>
            </a>
        </header>
        <h6>Made by @den_to_hksera</h6>
        <main class="stream-layout">
            <div class="video-container">
                <iframe
                    src="https://player.twitch.tv/?channel=drestvlog&parent=drestvlog.github.io"
                    allowfullscreen="true"
                    scrolling="no">
                </iframe>
            </div>

            <div class="chat-container">
                <iframe
                    src="https://www.twitch.tv/embed/drestvlog/chat?parent=drestvlog.github.io&darkpopout"
                    scrolling="no">
                </iframe>
            </div>
        </main>
        
    </div>

</body>
</html>
