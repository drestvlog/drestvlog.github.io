<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drestvlog Live</title>
    <style>
        /* Reset margins and eliminate scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container that maintains a strict 16:9 aspect ratio up to 1920x1080 */
        .stream-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            max-height: 1080px;
            aspect-ratio: 16 / 9;
        }

        /* Make the iframe fill the container completely */
        .stream-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="stream-container">
        <iframe
            src="https://player.twitch.tv/?channel=drestvlog&parent=drestvlog.github.io&autoplay=true&muted=false"
            allowfullscreen="true"
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
