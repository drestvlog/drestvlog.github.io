<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANERGO NINJA</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #2c1b10; /* Σκούρο ξύλινο background για ninja ατμόσφαιρα */
            border: 4px solid #4a3319;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Για να μην εμποδίζει το "κόψιμο" */
        }
        #score {
            color: #ffd700;
        }
        #lives {
            color: #ff4d4d;
            letter-spacing: 2px;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none; /* Κρυφό αρχικά */
            border-radius: 6px;
        }
        #game-over-screen h1 {
            font-size: 48px;
            color: #ff4d4d;
            margin-bottom: 10px;
        }
        #game-over-screen p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #restart-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #restart-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">♥♥♥</div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p>Τελικό Σκορ: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="resetGame()">Παίξε Ξανά</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreElement = document.getElementById('final-score');

    // --- ΡΥΘΜΙΣΕΙΣ ΕΙΚΟΝΩΝ ---
    const itemSources = [
        'chris.png',
        'teo.png',
        'hacky.png',
        'karp.png',
        'chol.png',
        'loukan.png',
        'booyah.png'
    ];
    const bombSource = 'bomb.png';

    // --- ΜΕΤΑΒΛΗΤΕΣ ΦΟΡΤΩΣΗΣ (Για ασφάλεια) ---
    let imagesLoaded = 0;
    const totalImages = itemSources.length + 1;

    function imageLoaded() {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
            // Μόλις φορτώσουν όλες οι εικόνες, ξεκινάει το animation loop
            animate();
        }
    }

    // Φόρτωση εικόνων αντικειμένων
    const itemImages = [];
    itemSources.forEach(src => {
        const img = new Image();
        img.onload = imageLoaded;
        img.onerror = () => console.error("Αδυναμία φόρτωσης της εικόνας: " + src);
        img.src = src;
        itemImages.push(img);
    });

    // Φόρτωση εικόνας βόμβας
    const bombImage = new Image();
    bombImage.onload = imageLoaded;
    bombImage.onerror = () => console.error("Αδυναμία φόρτωσης της βόμβας: " + bombSource);
    bombImage.src = bombSource;

    // --- Φόρτωση ήχου Explosion / Game Over ---
    const gameOverSound = new Audio('explosion.mp3');

    // --- ΜΕΤΑΒΛΗΤΕΣ ΠΑΙΧΝΙΔΙΟΥ ---
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let objects = [];
    let sliceTrail = []; 
    let spawnTimer = 0;
    const gravity = 0.25;

    // Κλάση για τα αντικείμενα
    class GameObject {
        constructor() {
            this.isBomb = Math.random() < 0.25; 
            this.img = this.isBomb ? bombImage : itemImages[Math.floor(Math.random() * itemImages.length)];
            
            this.radius = 45; 
            this.x = Math.random() * (canvas.width - 200) + 100;
            this.y = canvas.height + this.radius;
            
            // Κίνηση
            this.vx = (Math.random() - 0.5) * 3;
            this.vy = -(Math.random() * 3 + 9.5); 
            
            this.sliced = false;
            this.rotation = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.06;
            
            this.sliceAngle = 0;
            this.splitDistance = 0;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += gravity; 
            this.rotation += this.rotationSpeed;

            if (this.sliced) {
                this.splitDistance += 5; 
            }
        }

        draw() {
            if (!this.img.complete || this.img.naturalWidth === 0) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isBomb ? '#ff4d4d' : '#ffd700';
                ctx.fill();
                ctx.restore();
                return;
            }

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            if (!this.sliced) {
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
            } else {
                ctx.save();
                ctx.translate(-this.splitDistance, 0);
                ctx.beginPath();
                ctx.rect(-this.radius, -this.radius, this.radius, this.radius * 2);
                ctx.clip();
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.restore();

                ctx.save();
                ctx.translate(this.splitDistance, 0);
                ctx.beginPath();
                ctx.rect(0, -this.radius, this.radius, this.radius * 2);
                ctx.clip();
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.restore();
            }
            ctx.restore();
        }
    }

    function handleMove(clientX, clientY) {
        if (!gameActive) return;
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = (clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (clientY - rect.top) * (canvas.height / rect.height);

        sliceTrail.push({x: mouseX, y: mouseY, alpha: 1});

        objects.forEach(obj => {
            if (!obj.sliced) {
                let dist = Math.hypot(obj.x - mouseX, obj.y - mouseY);
                if (dist < obj.radius + 5) {
                    obj.sliced = true;
                    if (obj.isBomb) {
                        hitBomb();
                    } else {
                        score += 10;
                        scoreElement.innerText = "SCORE: " + score;
                    }
                }
            }
        });
    }

    canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    
    canvas.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) {
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }
        e.preventDefault();
    }, {passive: false});

    function hitBomb() {
        lives--;
        updateLivesUI();
        if (lives <= 0) {
            gameOver();
        }
    }

    function updateLivesUI() {
        livesElement.innerText = "♥".repeat(Math.max(0, lives)) + "♡".repeat(Math.max(0, 3 - lives));
    }

    function gameOver() {
        gameActive = false;
        finalScoreElement.innerText = score;
        gameOverScreen.style.display = 'flex';
        
        // Αναπαραγωγή του ήχου explosion.mp3
        gameOverSound.play().catch(error => {
            console.log("Η αυτόματη αναπαραγωγή εμποδίστηκε από τον browser:", error);
        });
    }

    function resetGame() {
        score = 0;
        lives = 3;
        objects = [];
        sliceTrail = [];
        gameActive = true;
        scoreElement.innerText = "SCORE: 0";
        updateLivesUI();
        gameOverScreen.style.display = 'none';
        animate();
    }

    // Κύριο Game Loop
    function animate() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        spawnTimer++;
        if (spawnTimer > 85) { 
            if (objects.length < 5) { 
                objects.push(new GameObject());
            }
            spawnTimer = 0;
        }

        for (let i = objects.length - 1; i >= 0; i--) {
            let obj = objects[i];
            obj.update();
            obj.draw();

            if (obj.y > canvas.height + obj.radius + 10) {
                if (!obj.isBomb && !obj.sliced) {
                    lives--;
                    updateLivesUI();
                    if (lives <= 0) gameOver();
                }
                objects.splice(i, 1);
            }
        }

        ctx.beginPath();
        for (let i = 1; i < sliceTrail.length; i++) {
            ctx.strokeStyle = `rgba(255, 255, 255, ${sliceTrail[i].alpha})`;
            ctx.lineWidth = i * 2; 
            ctx.lineCap = 'round';
            ctx.moveTo(sliceTrail[i-1].x, sliceTrail[i-1].y);
            ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
            ctx.stroke();
        }
        
        sliceTrail.forEach(pt => pt.alpha -= 0.08);
        sliceTrail = sliceTrail.filter(pt => pt.alpha > 0);

        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
