<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANERGO NINJA</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #2c1b10; /* Σκούρο ξύλινο background για ninja ατμόσφαιρα */
            border: 4px solid #4a3319;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Για να μην εμποδίζει το "κόψιμο" */
        }
        #score {
            color: #ffd700;
        }
        #lives {
            color: #ff4d4d;
            letter-spacing: 2px;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none; /* Κρυφό αρχικά */
            border-radius: 6px;
        }
        #game-over-screen h1 {
            font-size: 48px;
            color: #ff4d4d;
            margin-bottom: 10px;
        }
        #game-over-screen p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #restart-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #restart-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">♥♥♥</div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <p>Τελικό Σκορ: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="resetGame()">Παίξε Ξανά</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreElement = document.getElementById('final-score');

    // --- ΡΥΘΜΙΣΕΙΣ ΕΙΚΟΝΩΝ ---
    const itemSources = [
        'chris.png',
        'teo.png',
        'hacky.png',
        'karp.png',
        'chol.png',
        'loukan.png',
        'booyah.png'
    ];
    const bombSource = 'bomb.png';

    // Φόρτωση εικόνων αντικειμένων
    const itemImages = [];
    itemSources.forEach(src => {
        const img = new Image();
        img.src = src;
        itemImages.push(img);
    });

    // Φόρτωση εικόνας βόμβας
    const bombImage = new Image();
    bombImage.src = bombSource;

    // --- ΜΕΤΑΒΛΗΤΕΣ ΠΑΙΧΝΙΔΙΟΥ ---
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let objects = [];
    let sliceTrail = []; 
    let spawnTimer = 0;
    const gravity = 0.25;

    // Κλάση για τα αντικείμενα
    class GameObject {
        constructor() {
            this.isBomb = Math.random() < 0.25; 
            this.img = this.isBomb ? bombImage : itemImages[Math.floor(Math.random() * itemImages.length)];
            
            this.radius = 40; 
            this.x = Math.random() * (canvas.width - 200) + 100;
            this.y = canvas.height + this.radius;
            
            // --- ΑΛΛΑΓΗ: Μειώθηκε η ταχύτητα (vx και vy) για πιο αργή κίνηση ---
            this.vx = (Math.random() - 0.5) * 3;
            this.vy = -(Math.random() * 3 + 9.5); 
            
            this.sliced = false;
            this.rotation = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.06; // Πιο αργή περιστροφή
            
            this.sliceAngle = 0;
            this.splitDistance = 0;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += gravity; 
            this.rotation += this.rotationSpeed;

            if (this.sliced) {
                this.splitDistance += 5; 
            }
                </script>
