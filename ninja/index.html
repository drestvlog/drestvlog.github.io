<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANERGO NINJA</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #2c1b10; /* Σκούρο ξύλινο background για ninja ατμόσφαιρα */
            border: 4px solid #4a3319;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Για να μην εμποδίζει το "κόψιμο" */
        }
        #score {
            color: #ffd700;
        }
        #lives {
            color: #ff4d4d;
            letter-spacing: 2px;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none; /* Κρυφό αρχικά */
            border-radius: 6px;
        }
        #game-over-screen h1 {
            font-size: 48px;
            color: #ff4d4d;
            margin-bottom: 10px;
        }
        #game-over-screen p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #restart-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #restart-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">♥♥♥</div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over-screen" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>Τελικό Σκορ: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="resetGame()">Παίξε Ξανά</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreElement = document.getElementById('final-score');

    // --- ΡΥΘΜΙΣΕΙΣ ΕΙΚΟΝΩΝ (Βάλε τα δικά σου links ή ονόματα αρχείων εδώ) ---
    const itemSources = [
        'chris.png',
        'teo.png',
        'hacky.png',
        'karp.png',
        'chol.png',
        'loukan.png',
        'booyah.png'
    ];
    const bombSource = 'bomb.png';

    // Φόρτωση εικόνων αντικειμένων
    const itemImages = [];
    itemSources.forEach(src => {
        const img = new Image();
        img.src = src;
        itemImages.push(img);
    });

    // Φόρτωση εικόνας βόμβας
    const bombImage = new Image();
    bombImage.src = bombSource;

    // --- ΜΕΤΑΒΛΗΤΕΣ ΠΑΙΧΝΙΔΙΟΥ ---
    let score = 0;
    let lives = 3;
    let gameActive = true;
    let objects = [];
    let sliceTrail = []; // Για το εφέ της σπαθιάς
    let spawnTimer = 0;
    const gravity = 0.25;

    // Κλάση για τα αντικείμενα (Φρούτα/Βόμβες)
    class GameObject {
        constructor() {
            this.isBomb = Math.random() < 0.25; // 25% πιθανότητα να είναι βόμβα
            this.img = this.isBomb ? bombImage : itemImages[Math.floor(Math.random() * itemImages.length)];
            
            this.radius = 40; // Μέγεθος αντικειμένου
            this.x = Math.random() * (canvas.width - 200) + 100;
            this.y = canvas.height + this.radius;
            
            // Ταχύτητα εκτόξευσης (τυχαία x και y ώστε να πηγαίνουν προς τα πάνω)
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = -(Math.random() * 4 + 11); 
            
            this.sliced = false;
            this.rotation = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            
            // Για το εφέ κοψίματος (χωρισμός στα δύο)
            this.sliceAngle = 0;
            this.splitDistance = 0;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += gravity; // Εφαρμογή βαρύτητας
            this.rotation += this.rotationSpeed;

            if (this.sliced) {
                this.splitDistance += 5; // Απομάκρυνση των 2 κομματιών
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            if (!this.sliced) {
                // Σχεδίαση ολόκληρου του αντικειμένου
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
            } else {
                // Εφέ κοψίματος: Σχεδιάζουμε το αριστερό και δεξί μισό κομμάτι να απομακρύνονται
                ctx.save();
                ctx.translate(-this.splitDistance, 0);
                ctx.beginPath();
                ctx.rect(-this.radius, -this.radius, this.radius, this.radius * 2);
                ctx.clip();
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.restore();

                ctx.save();
                ctx.translate(this.splitDistance, 0);
                ctx.beginPath();
                ctx.rect(0, -this.radius, this.radius, this.radius * 2);
                ctx.clip();
                ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.restore();
            }
            ctx.restore();
        }
    }

    // Παρακολούθηση της κίνησης του ποντικιού/αφής για το κόψιμο
    let isDrawing = false;

    function handleMove(clientX, clientY) {
        if (!gameActive) return;
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;

        // Προσθήκη σημείου στο εφέ σπαθιάς
        sliceTrail.push({x: mouseX, y: mouseY, alpha: 1});

        // Έλεγχος αν χτυπήσαμε κάποιο αντικείμενο
        objects.forEach(obj => {
            if (!obj.sliced) {
                let dist = Math.hypot(obj.x - mouseX, obj.y - mouseY);
                if (dist < obj.radius) {
                    obj.sliced = true;
                    if (obj.isBomb) {
                        hitBomb();
                    } else {
                        score += 10;
                        scoreElement.innerText = "SCORE: " + score;
                    }
                }
            }
        });
    }

    canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    
    // Υποστήριξη και για κινητά/τάμπλετ (Αφή)
    canvas.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) {
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }
        e.preventDefault();
    }, {passive: false});

    function hitBomb() {
        lives--;
        updateLivesUI();
        if (lives <= 0) {
            gameOver();
        }
    }

    function updateLivesUI() {
        livesElement.innerText = "♥".repeat(Math.max(0, lives)) + "♡".repeat(Math.max(0, 3 - lives));
    }

    function gameOver() {
        gameActive = false;
        finalScoreElement.innerText = score;
        gameOverScreen.style.display = 'flex';
    }

    function resetGame() {
        score = 0;
        lives = 3;
        objects = [];
        sliceTrail = [];
        gameActive = true;
        scoreElement.innerText = "SCORE: 0";
        updateLivesUI();
        gameOverScreen.style.display = 'none';
        animate();
    }

    // Κύριο Game Loop
    function animate() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Διαχείριση δημιουργίας νέων αντικειμένων (Spawn)
        spawnTimer++;
        if (spawnTimer > 40) { // Όσο μικρότερο, τόσο πιο γρήγορα πετάγονται
            if (objects.length < 8) { // Μέγιστος αριθμός αντικειμένων στην οθόνη ταυτόχρονα
                objects.push(new GameObject());
            }
            spawnTimer = 0;
        }

        // 2. Ενημέρωση και σχεδίαση αντικειμένων
        for (let i = objects.length - 1; i >= 0; i--) {
            let obj = objects[i];
            obj.update();
            obj.draw();

            // Αν το αντικείμενο πέσει κάτω από την οθόνη
            if (obj.y > canvas.height + obj.radius + 10) {
                // Αν ήταν κανονικό αντικείμενο και ΔΕΝ κόπηκε, χάνεις ζωή
                if (!obj.isBomb && !obj.sliced) {
                    lives--;
                    updateLivesUI();
                    if (lives <= 0) gameOver();
                }
                objects.splice(i, 1);
            }
        }

        // 3. Σχεδίαση της γραμμής/σπαθιάς (Slice Trail)
        ctx.beginPath();
        for (let i = 1; i < sliceTrail.length; i++) {
            ctx.strokeStyle = `rgba(255, 255, 255, ${sliceTrail[i].alpha})`;
            ctx.lineWidth = i * 1.5; // Λεπταίνει στην αρχή της
            ctx.lineCap = 'round';
            ctx.moveTo(sliceTrail[i-1].x, sliceTrail[i-1].y);
            ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
            ctx.stroke();
        }
        
        // Μείωση του alpha για να σβήνει η σπαθιά σιγά σιγά
        sliceTrail.forEach(pt => pt.alpha -= 0.08);
        sliceTrail = sliceTrail.filter(pt => pt.alpha > 0);

        requestAnimationFrame(animate);
    }

    // Εκκίνηση του παιχνιδιού
    animate();
</script>

</body>
</html>
